name: Renovate NuGet regression repro

# Runs Renovate in DRY-RUN against this repo with two versions side-by-side:
#   - 43.207.4  (last known good)
#   - 43.211.0  (regressed)
# Trigger manually from the Actions tab. No PRs are created (dry-run=full);
# the proof is in the job logs (see README.md for exactly what to look for).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    name: renovate ${{ matrix.renovateVersion }}
    strategy:
      fail-fast: false
      matrix:
        renovateVersion:
          - "43.207.4" # last known good
          - "43.211.0" # regressed
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate (dry-run)
        uses: renovatebot/github-action@v46.1.14
        with:
          configurationFile: renovate.json
          token: ${{ secrets.GITHUB_TOKEN }}
          renovate-version: ${{ matrix.renovateVersion }}
        env:
          LOG_LEVEL: debug
          RENOVATE_DRY_RUN: "full"
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
